<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lunar Wars</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #app { width: 100vw; height: 100vh; }
    canvas { touch-action: none; }
    #zoom-wrap {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 100;
      user-select: none;
      pointer-events: none;
    }
    .zoom-icon {
      color: rgba(255,255,255,0.45);
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      line-height: 1;
      pointer-events: none;
    }
    .zoom-track {
      width: 36px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: auto;
    }
    #zoom-slider {
      width: 128px;
      transform: rotate(-90deg);
      cursor: pointer;
      accent-color: rgba(180,200,255,0.9);
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="zoom-wrap">
    <span class="zoom-icon">+</span>
    <div class="zoom-track">
      <input type="range" id="zoom-slider" min="10" max="200" value="160">
    </div>
    <span class="zoom-icon">−</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
